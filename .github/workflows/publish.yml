name: Publish to npm

# Publishes to npm via OIDC trusted publishing — no long-lived NPM_TOKEN.
# Triggered by publishing a GitHub Release (create one from a vX.Y.Z tag).
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; pin it for reproducible releases.
      - run: npm install -g npm@11.5.1

      - run: npm --version

      - run: npm ci

      - name: Check release tag matches package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event.release.tag_name }}" != "v${VERSION}" ]; then
            echo "Release tag ${{ github.event.release.tag_name }} does not match package.json version v${VERSION}"
            exit 1
          fi

      # prepublishOnly runs the full verify gate first.
      # Provenance is generated from the OIDC token; no token is passed.
      - run: npm publish --provenance

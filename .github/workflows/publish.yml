name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@11.5.1

      - run: npm ci

      - name: Check release tag matches package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event.release.tag_name }}" != "v${VERSION}" ]; then
            echo "Release tag ${{ github.event.release.tag_name }} does not match package.json version v${VERSION}"
            exit 1
          fi

      - run: npm publish --provenance

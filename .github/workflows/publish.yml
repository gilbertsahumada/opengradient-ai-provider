name: Publish to npm

# Publishes to npm via OIDC trusted publishing — no long-lived NPM_TOKEN.
# Triggered by publishing a GitHub Release (create one from a vX.Y.Z tag).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; node 22 ships an older npm.
      - run: npm install -g npm@latest

      - run: npm ci

      # prepublishOnly runs lint + typecheck + test + build first.
      # Provenance is generated from the OIDC token; no token is passed.
      - run: npm publish --provenance
